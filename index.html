<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>ACG2021 · Exam 3 Trainer</title>
<style>
:root{
  --bg:#0f1422; --bg2:#161d30; --panel:#1b2538; --panel2:#222e46;
  --ink:#eaf0fb; --muted:#9aa7c2; --line:#2c3850;
  --accent:#5b8cff; --accent2:#3fc7a8; --gold:#ffb454;
  --right:#2ecc71; --wrong:#ff6b6b;
  --shadow:0 8px 30px rgba(0,0,0,.35);
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  background:linear-gradient(160deg,#0f1422,#131a2c 60%,#0d1220);
  color:var(--ink); line-height:1.55; min-height:100vh;
  -webkit-font-smoothing:antialiased;
}
b{color:#fff}
.app{max-width:980px;margin:0 auto;padding:0 18px 80px}

/* top nav */
header{position:sticky;top:0;z-index:20;backdrop-filter:blur(10px);
  background:rgba(15,20,34,.82);border-bottom:1px solid var(--line);margin-bottom:22px}
.nav{max-width:980px;margin:0 auto;display:flex;align-items:center;gap:6px;padding:10px 14px;overflow-x:auto}
.brand{font-weight:800;letter-spacing:.3px;margin-right:8px;white-space:nowrap;color:#fff;font-size:15px}
.brand span{color:var(--accent)}
.nav-btn{background:transparent;border:0;color:var(--muted);font-size:14px;font-weight:600;
  padding:8px 12px;border-radius:9px;cursor:pointer;white-space:nowrap;transition:.15s}
.nav-btn:hover{color:#fff;background:var(--panel)}
.nav-btn.active{color:#fff;background:var(--accent)}

h1,h2,h3{line-height:1.25;color:#fff}
.page-h{font-size:26px;margin:6px 0 2px}
.sub{color:var(--muted);margin-bottom:18px}
.btn{background:var(--accent);color:#fff;border:0;padding:11px 18px;border-radius:11px;
  font-size:15px;font-weight:700;cursor:pointer;transition:.15s;box-shadow:var(--shadow)}
.btn:hover{filter:brightness(1.08);transform:translateY(-1px)}
.btn.ghost{background:var(--panel);color:var(--ink);box-shadow:none;border:1px solid var(--line)}
.btn.small{padding:7px 12px;font-size:13px}

/* dashboard */
.hero{background:linear-gradient(135deg,#1d2945,#172038);border:1px solid var(--line);
  border-radius:20px;padding:24px 26px;box-shadow:var(--shadow);margin-bottom:20px}
.hero-top{display:flex;justify-content:space-between;align-items:flex-start;gap:16px;flex-wrap:wrap}
.hero h1{font-size:28px}
.hero .sub{margin:6px 0 0}
.countdown{background:rgba(255,180,84,.13);color:var(--gold);border:1px solid rgba(255,180,84,.35);
  padding:9px 14px;border-radius:12px;font-weight:800;font-size:14px;white-space:nowrap}
.split{margin-top:16px;color:var(--ink);background:rgba(91,140,255,.1);border-left:3px solid var(--accent);
  padding:10px 14px;border-radius:8px;font-size:14px}

.card-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:14px;margin-bottom:22px}
.tile{text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:16px;
  padding:18px;cursor:pointer;transition:.18s;color:var(--ink)}
.tile:hover{transform:translateY(-3px);border-color:var(--accent);background:var(--panel2)}
.tile-ic{font-size:26px;margin-bottom:8px}
.tile h3{font-size:17px;margin-bottom:5px}
.tile p{color:var(--muted);font-size:13px}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;margin-bottom:16px}
.panel h2{font-size:18px;margin-bottom:14px}
.panel.small{font-size:13px;color:var(--muted)}
.mrow{display:grid;grid-template-columns:1fr;gap:6px;padding:10px;border-radius:10px;cursor:pointer;transition:.15s}
.mrow:hover{background:var(--panel2)}
.mrow-label{font-weight:600;font-size:14px}
.mrow-stat{font-size:12px;color:var(--muted)}
.bar{height:9px;background:var(--bg);border-radius:6px;overflow:hidden;border:1px solid var(--line)}
.bar.slim{height:6px;margin-bottom:16px}
.bar-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s}

/* learn */
.chtabs,.scopebar{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:18px}
.chtab,.chip{background:var(--panel);border:1px solid var(--line);color:var(--muted);
  padding:8px 13px;border-radius:10px;font-weight:600;font-size:13px;cursor:pointer;transition:.15s}
.chtab:hover,.chip:hover{color:#fff;border-color:var(--accent)}
.chtab.active,.chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.lesson-head{margin-bottom:18px}
.seg-tag{display:inline-block;background:rgba(63,199,168,.15);color:var(--accent2);
  font-size:12px;font-weight:700;padding:4px 10px;border-radius:20px;margin-bottom:8px}
.lesson-head h1{font-size:25px}
.lesson-sec{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:13px}
.lesson-sec h2{font-size:17px;color:var(--accent);margin-bottom:10px}
.lesson-sec ul{list-style:none}
.lesson-sec li{padding:7px 0 7px 22px;position:relative;border-bottom:1px solid rgba(44,56,80,.5);font-size:14.5px}
.lesson-sec li:last-child{border-bottom:0}
.lesson-sec li:before{content:"▸";position:absolute;left:2px;color:var(--accent2)}
.lesson-sec p{margin:8px 0;font-size:14.5px}
.formula{display:inline-block;background:var(--bg);border:1px solid var(--accent);color:var(--gold);
  font-family:ui-monospace,Menlo,Consolas,monospace;padding:3px 9px;border-radius:7px;font-size:13.5px;margin-top:4px}
.mnemo{background:linear-gradient(135deg,#23304d,#1a2640);border:1px solid var(--accent);
  border-radius:14px;padding:18px 20px;margin:13px 0}
.mnemo h2{font-size:17px;margin-bottom:10px}
.mnemo ul{list-style:none}
.mnemo li{padding:6px 0 6px 20px;position:relative;font-size:14px}
.mnemo li:before{content:"★";position:absolute;left:0;color:var(--gold)}
.lesson-actions,.prevnext{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.prevnext{justify-content:space-between}

/* flashcards */
.card-wrap{display:flex;flex-direction:column;align-items:center;gap:16px}
.card-counter{color:var(--muted);font-size:13px;font-weight:600}
.flashcard{width:100%;max-width:560px;height:300px;perspective:1400px;cursor:pointer;position:relative}
.fc-face{position:absolute;inset:0;backface-visibility:hidden;border-radius:18px;
  display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;
  padding:28px;transition:transform .5s;box-shadow:var(--shadow)}
.fc-front{background:linear-gradient(135deg,#1f2a44,#1a2238);border:1px solid var(--line)}
.fc-back{background:linear-gradient(135deg,#1c3a36,#163029);border:1px solid var(--accent2);transform:rotateY(180deg)}
.flashcard.flipped .fc-front{transform:rotateY(180deg)}
.flashcard.flipped .fc-back{transform:rotateY(360deg)}
.fc-hint{position:absolute;top:14px;left:18px;font-weight:800;color:var(--muted);font-size:13px;letter-spacing:1px}
.fc-text{font-size:19px;font-weight:600}
.fc-tap{position:absolute;bottom:14px;color:var(--muted);font-size:12px}
.card-ctrl{display:flex;gap:12px}
.done{font-size:20px;font-weight:700;text-align:center;padding:30px}

/* quiz */
.quiz-feature{display:block;width:100%;text-align:left;cursor:pointer;margin-bottom:16px;
  background:linear-gradient(135deg,#2a3a64,#1d2a4a);border:1px solid var(--accent);
  border-radius:16px;padding:18px 20px;color:var(--ink);transition:.16s;box-shadow:var(--shadow)}
.quiz-feature:hover{transform:translateY(-2px);filter:brightness(1.06)}
.feat-badge{display:inline-block;background:var(--gold);color:#1a1f2e;font-weight:800;font-size:11px;
  letter-spacing:.5px;padding:3px 9px;border-radius:20px;margin-bottom:8px}
.quiz-feature h3{font-size:17px;margin-bottom:4px}
.quiz-feature p{color:var(--muted);font-size:13.5px}
.quiz-modes{display:grid;grid-template-columns:repeat(auto-fit,minmax(230px,1fr));gap:12px}
.quiz-mode{text-align:left;background:var(--panel);border:1px solid var(--line);border-radius:14px;
  padding:16px;cursor:pointer;transition:.16s;color:var(--ink)}
.quiz-mode:hover{transform:translateY(-2px);border-color:var(--accent);background:var(--panel2)}
.quiz-mode h3{font-size:15px;margin-bottom:4px}
.quiz-mode p{color:var(--muted);font-size:13px}
.quiz-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.q-prog{color:var(--muted);font-size:13px;font-weight:600}
.q-tag{background:var(--panel);border:1px solid var(--line);padding:4px 10px;border-radius:20px;font-size:12px;color:var(--accent2);font-weight:700}
.q-text{font-size:19px;font-weight:600;margin:14px 0 16px}
.choices{display:flex;flex-direction:column;gap:10px}
.choice{text-align:left;background:var(--panel);border:1px solid var(--line);color:var(--ink);
  padding:14px 16px;border-radius:12px;font-size:15px;cursor:pointer;transition:.14s}
.choice:hover{border-color:var(--accent);background:var(--panel2)}
.choice.locked{cursor:default}
.choice.right{border-color:var(--right);background:rgba(46,204,113,.16);color:#fff}
.choice.wrong{border-color:var(--wrong);background:rgba(255,107,107,.14)}
.explain{margin-top:14px;padding:13px 16px;border-radius:11px;font-size:14px}
.explain.ok{background:rgba(46,204,113,.12);border:1px solid rgba(46,204,113,.4)}
.explain.no{background:rgba(255,107,107,.1);border:1px solid rgba(255,107,107,.4)}
.explain+.btn{margin-top:14px}
.quiz-result{text-align:center;padding:30px 10px;display:flex;flex-direction:column;align-items:center;gap:8px}
.big-score{font-size:54px;font-weight:800;color:var(--accent2)}
.score-pct{font-size:20px;color:var(--muted);margin-bottom:6px}
.quiz-result .btn{margin-top:8px}

/* drills */
.drill-stage{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:20px;margin-top:6px}
.drill-tag{display:inline-block;background:rgba(255,180,84,.14);color:var(--gold);font-weight:700;
  font-size:12px;padding:4px 11px;border-radius:20px;margin-bottom:12px}
.drill-prompt{font-size:15px;margin-bottom:16px}
.dtable{width:100%;border-collapse:collapse;margin:12px 0;font-size:14px;background:var(--bg);border-radius:10px;overflow:hidden}
.dtable.small{font-size:12px}
.dtable th,.dtable td{padding:7px 10px;border-bottom:1px solid var(--line);text-align:left}
.dtable th{background:var(--panel2);color:var(--accent2);font-size:12px;text-transform:uppercase;letter-spacing:.4px}
.dtable td.r,.dtable th.r{text-align:right;font-variant-numeric:tabular-nums}
.dtable td.imp{color:var(--gold);font-weight:700}
.dtable tr.tot td{font-weight:800;border-top:2px solid var(--accent);border-bottom:0;color:#fff}
.solution{margin-top:16px;padding:15px 17px;border-radius:12px;background:var(--bg2);border:1px solid var(--line);font-size:14px}
.solution.ok{border-color:rgba(46,204,113,.45)}
.solution.no{border-color:rgba(255,107,107,.45)}
.sol-h{font-weight:800;margin-bottom:8px;color:#fff}
.solution p{margin:6px 0}
.solution .tip{color:var(--gold);font-size:13px}
.drill-stage .btn{margin-top:14px;margin-right:8px}
.tip{color:var(--gold)}

/* cram */
.cram-formulas,.cram-ch,.cram-lists{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:18px 20px;margin-bottom:13px}
.cram-formulas{border-color:var(--accent)}
.cram-formulas h2,.cram-lists h2{font-size:17px;margin-bottom:10px;color:var(--accent)}
.cram-formulas ul{list-style:none}
.cram-formulas li{padding:7px 0 7px 22px;position:relative;border-bottom:1px solid rgba(44,56,80,.5);font-size:14px}
.cram-formulas li:before{content:"ƒ";position:absolute;left:4px;color:var(--gold);font-style:italic;font-weight:700}
.cram-ch h2{font-size:15px;color:var(--accent2);margin-bottom:8px}
.cram-ch ul{list-style:none}
.cram-ch li{padding:4px 0 4px 18px;position:relative;font-size:13.5px}
.cram-ch li:before{content:"★";position:absolute;left:0;color:var(--gold);font-size:11px}
.cram-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px}
.cram-grid div{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:11px 13px;font-size:13px;color:var(--muted)}
.cram-grid b{color:var(--accent2)}

/* tiers panel (what they test) */
.tierpanel{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:18px 20px;margin-bottom:16px}
.tierpanel h2{font-size:17px;margin-bottom:12px}
.tier{display:grid;grid-template-columns:64px 1fr;gap:10px;padding:9px 0;border-top:1px solid rgba(44,56,80,.6)}
.tier:first-of-type{border-top:0}
.tier-tag{font-weight:800;font-size:11px;letter-spacing:.5px;padding:3px 0;text-align:center;border-radius:7px;height:fit-content}
.tier.hi .tier-tag{background:rgba(255,107,107,.18);color:#ff8a8a;border:1px solid rgba(255,107,107,.4)}
.tier.md .tier-tag{background:rgba(255,180,84,.16);color:var(--gold);border:1px solid rgba(255,180,84,.4)}
.tier.lo .tier-tag{background:rgba(154,167,194,.14);color:var(--muted);border:1px solid var(--line)}
.tier ul{list-style:none}
.tier li{padding:3px 0;font-size:14px}
.tier.hi li{font-weight:600}
.tier.lo li{color:var(--muted)}

/* inline question (Learn) */
.inlineq{background:rgba(91,140,255,.07);border:1px solid var(--line);border-left:3px solid var(--accent);
  border-radius:10px;padding:13px 15px;margin-top:14px}
.inlineq-head{display:flex;align-items:center;gap:8px;margin-bottom:8px;position:relative}
.inlineq-label{font-size:12px;color:var(--muted);font-weight:600}
.inlineq-q{font-size:14.5px;font-weight:600;margin-bottom:10px}
.src{font-size:10px;font-weight:800;letter-spacing:.4px;padding:2px 7px;border-radius:5px}
.src-l{background:rgba(63,199,168,.18);color:var(--accent2);border:1px solid rgba(63,199,168,.4)}
.src-t{background:rgba(91,140,255,.18);color:#9bb6ff;border:1px solid rgba(91,140,255,.4)}
.src-p{background:rgba(255,180,84,.16);color:var(--gold);border:1px solid rgba(255,180,84,.4)}
.choices.small .choice{padding:10px 13px;font-size:14px}
.endq{margin-top:18px}
.endq h2{font-size:17px;color:var(--accent);margin-bottom:10px}

/* quiz feature variants */
.quiz-feature.timed{background:linear-gradient(135deg,#3a2e26,#2a2018);border-color:var(--gold)}
.quiz-feature.pattern{background:linear-gradient(135deg,#1d3a36,#162a28);border-color:var(--accent2)}
.quiz-feature.interleave{background:linear-gradient(135deg,#2c2348,#1f1a33);border-color:#9a7bff}
.feat-badge.gold{background:var(--gold)}
.feat-badge.teal{background:var(--accent2);color:#10201c}
.feat-badge.purple{background:#9a7bff;color:#16112e}

/* quiz header extras */
.q-right{display:flex;align-items:center;gap:8px}
.q-timer{background:var(--panel);border:1px solid var(--gold);color:var(--gold);font-weight:800;
  font-variant-numeric:tabular-nums;padding:4px 10px;border-radius:8px;font-size:14px}
.q-timer.danger{background:rgba(255,107,107,.18);border-color:var(--wrong);color:#ff8a8a;animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.55}}

/* timed review */
.review{margin-top:24px}
.review h2{font-size:18px;margin-bottom:12px}
.review-q{background:var(--panel);border:1px solid var(--line);border-radius:11px;padding:13px 15px;margin-bottom:10px}
.rv-q{font-weight:600;font-size:14px;margin-bottom:6px}
.rv-a{color:var(--right);font-weight:700;font-size:13.5px;margin-bottom:5px}
.rv-why{color:var(--muted);font-size:13px}

/* flag button + source ref */
.flagbtn{background:var(--panel);border:1px solid var(--line);color:var(--muted);font-size:11px;font-weight:700;
  padding:4px 9px;border-radius:7px;cursor:pointer;white-space:nowrap;transition:.14s;margin-left:auto}
.flagbtn:hover{border-color:var(--gold);color:var(--gold)}
.flagbtn.on{background:rgba(255,180,84,.16);border-color:var(--gold);color:var(--gold)}
.qref{font-size:11.5px;color:var(--muted);margin:4px 0 10px;font-style:italic;opacity:.85}
.q-text + .qref{margin-top:-8px;margin-bottom:14px}
.review-q .flagbtn{margin-top:8px}
.feat-badge.red{background:var(--wrong);color:#fff}
.quiz-feature.flagged{background:linear-gradient(135deg,#3a262c,#2a1c20);border-color:var(--wrong)}
.quiz-feature.weak{background:linear-gradient(135deg,#3a2630,#2a1a22);border-color:#ff8a8a}
.weakbtn{display:block;margin-top:8px;background:linear-gradient(135deg,#b5485f,#8a3a4c)}

/* cram hit list */
.cram-hitlist{background:linear-gradient(135deg,#3a2630,#2a1c24);border:1px solid var(--wrong);border-radius:14px;padding:18px 20px;margin-bottom:13px}
.cram-hitlist h2{font-size:17px;margin-bottom:12px;color:#ff8a8a}
.hit-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}
.hit-ch{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:12px 14px}
.hit-ch b{color:var(--accent2);font-size:13.5px;display:block;margin-bottom:6px}
.hit-ch ul{list-style:none}
.hit-ch li{font-size:12.5px;padding:3px 0 3px 14px;position:relative}
.hit-ch li:before{content:"▸";position:absolute;left:0;color:#ff8a8a}

.gtag{display:inline-block;background:var(--wrong);color:#fff;font-size:10px;font-weight:800;letter-spacing:.5px;padding:2px 7px;border-radius:5px;vertical-align:middle;margin-left:8px}

/* framework / matrix grids in Learn */
.matrixbox{margin:14px 0 4px}
.matrix-title{font-size:13px;font-weight:700;color:var(--accent2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
.matrix{width:100%;border-collapse:separate;border-spacing:6px;table-layout:fixed}
.matrix .m-corner{background:transparent;border:0;width:84px}
.matrix .m-col{background:var(--panel2);color:var(--accent);font-size:12px;font-weight:700;padding:8px 6px;border-radius:8px;text-align:center;vertical-align:middle}
.matrix .m-row{background:var(--panel2);color:var(--accent);font-size:12px;font-weight:700;padding:8px 6px;border-radius:8px;text-align:center;width:84px;vertical-align:middle}
.matrix .m-cell{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:10px 11px;font-size:13px;vertical-align:top;line-height:1.4}
.matrix .m-cell b{color:#fff}

/* ===== RECALL (free-response) ===== */
.recall-stage{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:22px;margin-top:6px}
.recall-kind{display:inline-block;background:rgba(63,199,168,.15);color:var(--accent2);font-weight:700;font-size:12px;padding:4px 11px;border-radius:20px;margin-bottom:12px}
.recall-prompt{font-size:19px;font-weight:600;margin-bottom:16px;color:#fff}
textarea.answerbox{width:100%;min-height:120px;background:var(--bg);border:1px solid var(--line);border-radius:12px;
  color:var(--ink);font-size:15px;padding:14px;font-family:inherit;line-height:1.5;resize:vertical}
textarea.answerbox:focus{outline:none;border-color:var(--accent)}
.model-answer{margin-top:16px;background:var(--bg2);border:1px solid var(--accent2);border-radius:12px;padding:16px 18px}
.model-answer h3{font-size:14px;color:var(--accent2);margin-bottom:8px;text-transform:uppercase;letter-spacing:.4px}
.model-answer ul{list-style:none;margin:6px 0}
.model-answer li{padding:5px 0 5px 22px;position:relative;font-size:14.5px}
.model-answer li:before{content:"▸";position:absolute;left:2px;color:var(--accent2)}
.self-grade{display:flex;gap:10px;margin-top:14px;flex-wrap:wrap}
.recall-count{color:var(--muted);font-size:13px;font-weight:600;margin-bottom:10px}

/* ===== BRAIN DUMP ===== */
.bd-intro{background:rgba(154,123,255,.08);border:1px solid #9a7bff;border-left:3px solid #9a7bff;border-radius:10px;padding:13px 16px;margin-bottom:16px;font-size:14px}
.bd-checklist{margin-top:16px}
.bd-item{display:flex;align-items:flex-start;gap:10px;background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:11px 14px;margin-bottom:8px;font-size:14.5px;transition:.15s}
.bd-item.hit{border-color:var(--right);background:rgba(46,204,113,.10)}
.bd-item.miss{border-color:rgba(255,107,107,.4)}
.bd-mark{font-weight:800;font-size:16px;min-width:22px}
.bd-item.hit .bd-mark{color:var(--right)}
.bd-item.miss .bd-mark{color:#ff8a8a}

<!-- ===== passcode gate ===== -->
<div id="gate" class="gate" style="position:fixed;inset:0;z-index:1000;background:linear-gradient(160deg,#0f1422,#131a2c 60%,#0d1220);display:flex;align-items:center;justify-content:center;padding:20px">
  <div class="gate-card" style="background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:34px 30px;max-width:380px;width:100%;text-align:center;box-shadow:var(--shadow)">
    <div class="gate-logo" style="font-weight:800;font-size:22px;letter-spacing:.5px;margin-bottom:14px">ACG<span style="color:var(--accent)">2021</span></div>
    <h1 style="font-size:22px;margin-bottom:6px">Exam 3 Trainer</h1>
    <p style="color:var(--muted);font-size:14px;margin-bottom:18px">Enter the class passcode to continue.</p>
    <input id="gatecode" type="password" placeholder="passcode" autocomplete="off" autocapitalize="off" spellcheck="false"
      style="width:100%;padding:13px 15px;border-radius:11px;border:1px solid var(--line);background:var(--bg);color:var(--ink);font-size:16px;text-align:center;margin-bottom:12px">
    <button id="gatego" style="width:100%;background:var(--accent);color:#fff;border:0;padding:13px;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer">Unlock →</button>
    <div id="gateerr" style="display:none;color:var(--wrong);font-size:13px;margin-top:12px;font-weight:600">Incorrect passcode — try again.</div>
  </div>
</div>

<script>
/* ===========================================================
   Passcode gate.  ▼▼▼  CHANGE THE PASSCODE ON THE NEXT LINE  ▼▼▼
   Share this word with your study group; it's case-insensitive.  */
   var PASSCODE = "reed";
/* ▲▲▲ ----------------------------------------------------- ▲▲▲
   Note: this hides the app from casual visitors & search engines,
   but a static site can't truly hide its files. Good enough for
   a study group — don't treat it as real security. */
(function(){
  var KEY="acg2021_unlocked", APP=["data.js","practice.js","testbank.js","exambank.js","mockbank.js","study.js","lessons.js","app.js"];
  function loadSeq(list,done){ (function next(i){ if(i>=list.length) return done&&done(); var s=document.createElement("script"); s.src=list[i]; s.onload=function(){next(i+1);}; document.body.appendChild(s); })(0); }
  function unlock(){ var g=document.getElementById("gate"); if(g) g.style.display="none"; loadSeq(APP); }
  function tryUnlock(){
    var v=(document.getElementById("gatecode").value||"").trim().toLowerCase();
    if(v===String(PASSCODE).trim().toLowerCase()){ try{sessionStorage.setItem(KEY,"1");}catch(e){} unlock(); }
    else { document.getElementById("gateerr").style.display="block"; }
  }
  document.addEventListener("DOMContentLoaded",function(){
    var unlocked=false; try{unlocked=!!sessionStorage.getItem(KEY);}catch(e){}
    if(unlocked){ unlock(); return; }
    document.getElementById("gatego").addEventListener("click",tryUnlock);
    var inp=document.getElementById("gatecode");
    inp.addEventListener("keydown",function(e){ if(e.key==="Enter") tryUnlock(); });
    inp.focus();
  });
})();
</script>
